apiVersion: apps/v1
kind: Deployment
metadata:
  name: educycle-frontend
  labels:
    app: educycle-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: educycle-frontend
  template:
    metadata:
      labels:
        app: educycle-frontend
    spec:
      containers:
        - name: web
          image: ghcr.io/your-org/educycle-frontend:latest
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi

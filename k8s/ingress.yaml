apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: educycle-ingress
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  rules:
    - host: educycle.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: educycle-frontend
                port:
                  number: 80
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: educycle-backend
                port:
                  number: 8080
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: educycle-backend
                port:
                  number: 8080

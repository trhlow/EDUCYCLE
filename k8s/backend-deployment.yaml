apiVersion: apps/v1
kind: Deployment
metadata:
  name: educycle-backend
  labels:
    app: educycle-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: educycle-backend
  template:
    metadata:
      labels:
        app: educycle-backend
    spec:
      containers:
        - name: api
          image: ghcr.io/your-org/educycle-backend:latest
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              valueFrom:
                configMapKeyRef:
                  name: educycle-config
                  key: SPRING_PROFILES_ACTIVE
            - name: APP_FRONTEND_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: educycle-config
                  key: APP_FRONTEND_BASE_URL
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                configMapKeyRef:
                  name: educycle-config
                  key: SPRING_DATASOURCE_URL
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: educycle-secret
                  key: SPRING_DATASOURCE_USERNAME
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: educycle-secret
                  key: SPRING_DATASOURCE_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: educycle-secret
                  key: JWT_SECRET
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 45
            periodSeconds: 20
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 700m
              memory: 768Mi

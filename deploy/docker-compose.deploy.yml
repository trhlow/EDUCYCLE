services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  db:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-educycledb}
      POSTGRES_USER: ${POSTGRES_USER:-educycle}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - educycle_pg_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-educycle} -d ${POSTGRES_DB:-educycledb}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    image: ${API_IMAGE:?Set API_IMAGE before deploy}
    restart: unless-stopped
    pull_policy: always
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-production}
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-educycledb}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-educycle}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      APP_FRONTEND_BASE_URL: ${APP_FRONTEND_BASE_URL:?Set APP_FRONTEND_BASE_URL in .env}
      APP_MAIL_REQUIRE_DELIVERY: ${APP_MAIL_REQUIRE_DELIVERY:-true}
      APP_UPLOAD_DIR: /app/data/uploads
      EDUCYCLE_REDIS_ENABLED: ${EDUCYCLE_REDIS_ENABLED:-true}
      EDUCYCLE_REDIS_HOST: redis
      EDUCYCLE_REDIS_PORT: 6379
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      UNSPLASH_ACCESS_KEY: ${UNSPLASH_ACCESS_KEY:-}
      UNSPLASH_CACHE_TTL_SECONDS: ${UNSPLASH_CACHE_TTL_SECONDS:-21600}
    volumes:
      - educycle_uploads:/app/data/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  web:
    image: ${WEB_IMAGE:?Set WEB_IMAGE before deploy}
    restart: unless-stopped
    pull_policy: always
    ports:
      - "${WEB_HTTP_PORT:-80}:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  educycle_pg_data:
  educycle_uploads:

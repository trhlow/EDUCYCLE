spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/educycledb
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate          # Flyway manages schema; Hibernate only validates
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jackson:
    serialization:
      write-dates-as-timestamps: false

jwt:
  secret: THIS_IS_A_SUPER_SECRET_KEY_123456_MUST_BE_AT_LEAST_32_CHARS
  issuer: EduCycle
  audience: EduCycleUsers
  expiration-hours: 2

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    root: INFO
    com.educycle: DEBUG
    org.springframework.security: WARN

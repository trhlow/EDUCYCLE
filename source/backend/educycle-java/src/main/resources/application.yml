spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/educycledb}
    username: ${SPRING_DATASOURCE_USERNAME:educycle}
    password: ${SPRING_DATASOURCE_PASSWORD:educycle123}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate          # Flyway manages schema; Hibernate only validates
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jackson:
    serialization:
      write-dates-as-timestamps: false

cors:
  allowed-origins:
    - "http://localhost:5173"
    - "http://localhost:3000"

jwt:
  secret: ${JWT_SECRET:CHANGE_ME_IN_PRODUCTION_AT_LEAST_32_CHARS_LONG}
  issuer: EduCycle
  audience: EduCycleUsers
  expiration-hours: 2

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    root: INFO
    com.educycle: DEBUG
    org.springframework.security: WARN

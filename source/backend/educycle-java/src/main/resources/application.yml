spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/educycledb}
    username: ${SPRING_DATASOURCE_USERNAME:educycle}
    password: ${SPRING_DATASOURCE_PASSWORD:educycle123}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jackson:
    serialization:
      write-dates-as-timestamps: false

cors:
  allowed-origins:
    - "http://localhost:5173"
    - "http://127.0.0.1:5173"
    - "http://localhost:3000"

jwt:
  secret: ${JWT_SECRET:CHANGE_ME_IN_PRODUCTION_AT_LEAST_32_CHARS_LONG}
  issuer: EduCycle
  audience: EduCycleUsers
  expiration-hours: 2

# ── OAuth2 Social Login ────────────────────────────────────────────────────
# Điền Client ID từ Google Console và Azure Portal vào đây
# HOẶC dùng biến môi trường để không commit credentials lên git
oauth:
  google:
    client-id: 655696942996-23v3ded01q45mth3lufocjntei1mnfp9.apps.googleusercontent.com
    jwks-uri: https://www.googleapis.com/oauth2/v3/certs
  microsoft:
    client-id: 26196491-b38e-48fb-b900-72c05aaec7c0
    # "common" cho phép cả tài khoản cá nhân + tổ chức (trường học)
    # Nếu chỉ muốn tài khoản trường học: đổi thành tenant ID của tổ chức
    tenant-id: common
    jwks-uri: https://login.microsoftonline.com/common/discovery/v2.0/keys

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    root: INFO
    com.educycle: DEBUG
    org.springframework.security: WARN

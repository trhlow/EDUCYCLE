spring:
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 6MB

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/educycledb}
    username: ${SPRING_DATASOURCE_USERNAME:educycle}
    password: ${SPRING_DATASOURCE_PASSWORD:educycle123}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jackson:
    serialization:
      write-dates-as-timestamps: false

# ── SMTP (tuỳ chọn) ─────────────────────────────────────────────────────────
# Thêm profile "smtp" + biến MAIL_* — xem application-smtp.yml và README (mục Email).
# Ví dụ local: mvn spring-boot:run "-Dspring-boot.run.profiles=docker,smtp"
# Docker: SPRING_PROFILES_ACTIVE=production,smtp trong .env (cùng MAIL_HOST, …).

server:
  forward-headers-strategy: framework

app:
  frontend-base-url: ${APP_FRONTEND_BASE_URL:http://localhost:5173}
  mail-from: ${APP_MAIL_FROM:EduCycle <noreply@educycle.local>}
  # Ảnh sản phẩm (local). Production: dùng object storage + URL công khai.
  upload-dir: ${APP_UPLOAD_DIR:./data/uploads}

# Danh sách origin cách nhau bởi dấu phẩy — production set CORS_ALLOWED_ORIGINS
cors:
  allowed-origins-csv: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:3000,http://localhost,http://127.0.0.1}

jwt:
  secret: ${JWT_SECRET:CHANGE_ME_IN_PRODUCTION_AT_LEAST_32_CHARS_LONG}
  issuer: EduCycle
  audience: EduCycleUsers
  expiration-hours: 2

# OAuth client ID là public; production nên set GOOGLE_CLIENT_ID / MICROSOFT_CLIENT_ID qua env (Docker .env).
oauth:
  google:
    client-id: ${GOOGLE_CLIENT_ID:655696942996-23v3ded01q45mth3lufocjntei1mnfp9.apps.googleusercontent.com}
    client-secret: ${GOOGLE_CLIENT_SECRET:}
    jwks-uri: https://www.googleapis.com/oauth2/v3/certs
  microsoft:
    client-id: ${MICROSOFT_CLIENT_ID:26196491-b38e-48fb-b900-72c05aaec7c0}
    tenant-id: common
    jwks-uri: https://login.microsoftonline.com/common/discovery/v2.0/keys

# ── Anthropic AI Chatbot ────────────────────────────────────────────────────
# Lấy API key tại: https://console.anthropic.com/
# Dùng biến môi trường ANTHROPIC_API_KEY để không commit key lên git
anthropic:
  api-key: ${ANTHROPIC_API_KEY:}
  model: claude-sonnet-4-20250514

# ── EduCycle ── rate limit API (Bucket4j filter), Redis (AI rate limit đa instance)
educycle:
  rate-limit:
    enabled: true
    prefer-x-real-ip: false
  redis:
    enabled: ${EDUCYCLE_REDIS_ENABLED:false}
    host: ${EDUCYCLE_REDIS_HOST:localhost}
    port: ${EDUCYCLE_REDIS_PORT:6379}

# ── Sentry (tuỳ chọn) — chỉ gửi khi SENTRY_DSN có giá trị ──
sentry:
  dsn: ${SENTRY_DSN:}
  environment: ${SENTRY_ENVIRONMENT:development}
  traces-sample-rate: ${SENTRY_TRACES_SAMPLE_RATE:0.0}

otel:
  sdk:
    disabled: ${OTEL_SDK_DISABLED:true}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

logging:
  level:
    root: INFO
    com.educycle: DEBUG
    org.springframework.security: WARN

spring:
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 6MB

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/educycledb}
    username: ${SPRING_DATASOURCE_USERNAME:educycle}
    password: ${SPRING_DATASOURCE_PASSWORD:educycle123}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jackson:
    serialization:
      write-dates-as-timestamps: false

# ── SMTP (tuỳ chọn) ─────────────────────────────────────────────────────────
# Thêm profile "smtp" + biến MAIL_* — xem application-smtp.yml và README (mục Email).
# Ví dụ local: mvn spring-boot:run "-Dspring-boot.run.profiles=docker,smtp"
# Docker: SPRING_PROFILES_ACTIVE=production,smtp trong .env (cùng MAIL_HOST, …).

app:
  frontend-base-url: ${APP_FRONTEND_BASE_URL:http://localhost:5173}
  mail-from: ${APP_MAIL_FROM:EduCycle <noreply@educycle.local>}
  # Ảnh sản phẩm (local). Production: dùng object storage + URL công khai.
  upload-dir: ${APP_UPLOAD_DIR:./data/uploads}

cors:
  allowed-origins:
    - "http://localhost:5173"
    - "http://127.0.0.1:5173"
    - "http://localhost:3000"
    # Docker Compose / nginx phục vụ SPA tại cổng 80 (Sprint 4)
    - "http://localhost"
    - "http://127.0.0.1"

jwt:
  secret: ${JWT_SECRET:CHANGE_ME_IN_PRODUCTION_AT_LEAST_32_CHARS_LONG}
  issuer: EduCycle
  audience: EduCycleUsers
  expiration-hours: 2

oauth:
  google:
    client-id: 655696942996-23v3ded01q45mth3lufocjntei1mnfp9.apps.googleusercontent.com
    jwks-uri: https://www.googleapis.com/oauth2/v3/certs
  microsoft:
    client-id: 26196491-b38e-48fb-b900-72c05aaec7c0

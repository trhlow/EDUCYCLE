# =============================================================================
#  EduCycle – GitHub Actions
#  File: .github/workflows/continuous-dev.yml
#
#  Triggers:
#    • push to dev        → auto bump semantic version
#    • workflow_dispatch  → manual release (merges dev → main)
# =============================================================================

name: Continuous Dev Pipeline

on:
  push:
    branches:
      - dev
  workflow_dispatch:
    inputs:
      action:
        description: "Choose action"
        required: true
        default: "release"
        type: choice
        options:
          - release

# Cancel in-progress runs on the same branch to avoid race conditions
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  #  JOB 1: Auto version bump (runs on every push to dev)
  # ────────────────────────────────────────────────────────────────────────────
  bump-version:
    name: 🔖 Auto Semantic Version Bump
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    permissions:
      contents: write   # needed to push commits and tags

    steps:
      - name: Checkout repository (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run version bump script
        run: |
          chmod +x ./continuous-dev.sh
          bash ./continuous-dev.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Show current VERSION
        run: |
          echo "📦 Version in this build: $(cat VERSION)"

  # ────────────────────────────────────────────────────────────────────────────
  #  JOB 2: Build & Test (runs after bump, still on dev push)
  # ────────────────────────────────────────────────────────────────────────────
  build-and-test:
    name: 🏗️ Build & Test (Java)
    runs-on: ubuntu-latest
    needs: bump-version
    if: github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Build with Maven
        run: mvn -B clean package --no-transfer-progress

      - name: Run tests
        run: mvn -B test --no-transfer-progress

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ github.run_number }}
          path: target/surefire-reports/

  # ────────────────────────────────────────────────────────────────────────────
  #  JOB 3: Release (only on manual workflow_dispatch with action=release)
  # ────────────────────────────────────────────────────────────────────────────
  release:
    name: 🚀 Release – Merge dev → main
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'release'

    permissions:
      contents: write

    steps:
      - name: Checkout repository (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name  "Release Bot"
          git config user.email "bot@educycle.dev"

      - name: Run release script
        run: |
          chmod +x ./release.sh
          bash ./release.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Print release summary
        run: |
          echo "### 🎉 Release complete!" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** $(cat VERSION)"  >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** main"             >> $GITHUB_STEP_SUMMARY
          echo "- **Tag pushed:** ✅"           >> $GITHUB_STEP_SUMMARY

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/educycle-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#1e88e5" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <!-- frame-ancestors is ignored in meta CSP; set it on the HTTP response instead (MDN). -->
    <meta http-equiv="Content-Security-Policy"
      content="default-src 'self';
             script-src 'self' https://accounts.google.com;
             style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://accounts.google.com;
             font-src 'self' https://fonts.gstatic.com;
             img-src 'self' data: https:;
             frame-src 'self' https://accounts.google.com https://login.microsoftonline.com;
             connect-src 'self' http://localhost:5173 http://localhost:8080 ws://localhost:5173 ws://localhost:8080 https://api.educycle.com https://accounts.google.com https://www.googleapis.com https://login.microsoftonline.com https://graph.microsoft.com;" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <title>EduCycle - Educational Marketplace</title>

name: EduCycle CD

on:
  workflow_run:
    workflows: ["EduCycle CI"]
    types: [completed]
    branches: [dev, main]
  workflow_dispatch:
    inputs:
      target:
        description: Deployment target environment
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production
      ref:
        description: Git ref to deploy (branch, tag, or commit SHA)
        required: false
        default: dev

concurrency:
  group: educycle-cd-${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || github.ref_name }}
  cancel-in-progress: true

jobs:
  resolve-context:
    name: Resolve deployment context
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.resolve.outputs.should_run }}
      ref: ${{ steps.resolve.outputs.ref }}
      target_env: ${{ steps.resolve.outputs.target_env }}
    steps:
      - name: Resolve trigger data
        id: resolve
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            conclusion="${{ github.event.workflow_run.conclusion }}"
            branch="${{ github.event.workflow_run.head_branch }}"
            sha="${{ github.event.workflow_run.head_sha }}"

            if [[ "$conclusion" != "success" ]]; then
              echo "should_run=false" >> "$GITHUB_OUTPUT"
              echo "ref=$sha" >> "$GITHUB_OUTPUT"
              echo "target_env=skip" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            case "$branch" in
              dev) target_env="staging" ;;
              main) target_env="production" ;;
              *)
                echo "should_run=false" >> "$GITHUB_OUTPUT"
                echo "ref=$sha" >> "$GITHUB_OUTPUT"
                echo "target_env=skip" >> "$GITHUB_OUTPUT"
                exit 0
                ;;
            esac

            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "ref=$sha" >> "$GITHUB_OUTPUT"
            echo "target_env=$target_env" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          ref_input="${{ github.event.inputs.ref }}"
          if [[ -z "$ref_input" ]]; then
            ref_input="${GITHUB_REF_NAME}"
          fi

          echo "should_run=true" >> "$GITHUB_OUTPUT"
          echo "ref=$ref_input" >> "$GITHUB_OUTPUT"
          echo "target_env=${{ github.event.inputs.target }}" >> "$GITHUB_OUTPUT"

  build-and-push:
    name: Build and push images
    needs: resolve-context
    if: needs.resolve-context.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-context.outputs.ref }}

      - name: Resolve image tag
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          echo "image_tag=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/api
          file: ./apps/api/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/educycle-api:${{ steps.meta.outputs.image_tag }}
            ghcr.io/${{ github.repository_owner }}/educycle-api:${{ needs.resolve-context.outputs.target_env }}-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Web image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/web
          file: ./apps/web/Dockerfile
          push: true
          build-args: |
            VITE_API_URL=/api
          tags: |
            ghcr.io/${{ github.repository_owner }}/educycle-web:${{ steps.meta.outputs.image_tag }}
            ghcr.io/${{ github.repository_owner }}/educycle-web:${{ needs.resolve-context.outputs.target_env }}-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    name: Deploy staging
    needs: [resolve-context, build-and-push]
    if: needs.resolve-context.outputs.should_run == 'true' && needs.resolve-context.outputs.target_env == 'staging'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-context.outputs.ref }}

      - name: Upload deploy compose file
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "infra/docker/docker-compose.deploy.yml"
          target: ${{ secrets.DEPLOY_PATH }}
          strip_components: 1

      - name: Run remote deploy
        uses: appleboy/ssh-action@v1.2.5
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          API_IMAGE: ghcr.io/${{ github.repository_owner }}/educycle-api:${{ needs.build-and-push.outputs.image_tag }}
          WEB_IMAGE: ghcr.io/${{ github.repository_owner }}/educycle-web:${{ needs.build-and-push.outputs.image_tag }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          envs: DEPLOY_PATH,GHCR_USERNAME,GHCR_TOKEN,API_IMAGE,WEB_IMAGE
          script: |
            set -euo pipefail
            mkdir -p "$DEPLOY_PATH"
            cd "$DEPLOY_PATH"

            if [ ! -f ".env" ]; then
              echo "Missing deployment .env at $DEPLOY_PATH/.env"
              exit 1
            fi

            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            export API_IMAGE WEB_IMAGE
            docker compose -f docker-compose.deploy.yml pull
            docker compose -f docker-compose.deploy.yml up -d --remove-orphans
            curl -fsS http://localhost/api/public/health > /dev/null
            curl -fsSI http://localhost > /dev/null
            docker image prune -f
            docker logout ghcr.io

  deploy-production:
    name: Deploy production
    needs: [resolve-context, build-and-push]
    if: needs.resolve-context.outputs.should_run == 'true' && needs.resolve-context.outputs.target_env == 'production'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-context.outputs.ref }}

      - name: Upload deploy compose file
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "infra/docker/docker-compose.deploy.yml"
          target: ${{ secrets.DEPLOY_PATH }}
          strip_components: 1

      - name: Run remote deploy
        uses: appleboy/ssh-action@v1.2.5
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          API_IMAGE: ghcr.io/${{ github.repository_owner }}/educycle-api:${{ needs.build-and-push.outputs.image_tag }}
          WEB_IMAGE: ghcr.io/${{ github.repository_owner }}/educycle-web:${{ needs.build-and-push.outputs.image_tag }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          envs: DEPLOY_PATH,GHCR_USERNAME,GHCR_TOKEN,API_IMAGE,WEB_IMAGE
          script: |
            set -euo pipefail
            mkdir -p "$DEPLOY_PATH"
            cd "$DEPLOY_PATH"

            if [ ! -f ".env" ]; then
              echo "Missing deployment .env at $DEPLOY_PATH/.env"
              exit 1
            fi

            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            export API_IMAGE WEB_IMAGE
            docker compose -f docker-compose.deploy.yml pull
            docker compose -f docker-compose.deploy.yml up -d --remove-orphans
            curl -fsS http://localhost/api/public/health > /dev/null
            curl -fsSI http://localhost > /dev/null
            docker image prune -f
            docker logout ghcr.io

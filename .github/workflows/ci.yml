name: EduCycle CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  backend:
    name: Build Backend (Java 17)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build & verify
        env:
          CI: true
        run: mvn -f backend/educycle-java/pom.xml clean verify

  e2e-api:
    name: E2E API (Spring + Postgres)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: educycledb
          POSTGRES_USER: educycle
          POSTGRES_PASSWORD: educycle_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U educycle -d educycledb"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Package API (skip unit tests)
        run: mvn -f backend/educycle-java/pom.xml -q -DskipTests package

      - name: Start API
        env:
          JWT_SECRET: ci_github_actions_jwt_secret_min_32_characters_here
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/educycledb
          SPRING_DATASOURCE_USERNAME: educycle
          SPRING_DATASOURCE_PASSWORD: educycle_test
          EDUCYCLE_E2E_FIXED_OTP: '123456'
        run: |
          java -jar backend/educycle-java/target/educycle-api-1.0.0.jar --spring.profiles.active=ci &
          echo $! > /tmp/educycle-api.pid

      - name: Set up Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Wait for API
        run: npx --yes wait-on -t 120000 http://127.0.0.1:8080/actuator/health

      - name: Install frontend deps (Playwright)
        run: npm ci
        working-directory: frontend

      - name: Install Playwright (Chromium only)
        run: npx playwright install --with-deps chromium
        working-directory: frontend

      - name: Playwright API tests
        run: npm run test:e2e:api
        working-directory: frontend
        env:
          CI: true
          API_BASE_URL: http://127.0.0.1:8080
          EDUCYCLE_E2E_FIXED_OTP: '123456'

  frontend:
    name: Build Frontend (Node 20)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: npm audit (critical)
        run: npm audit --audit-level=critical
        working-directory: frontend

      - name: npm audit (high — advisory)
        run: npm audit --audit-level=high
        continue-on-error: true
        working-directory: frontend

      - name: TypeScript
        run: npm run typecheck
        working-directory: frontend

      - name: Test
        run: npm test
        working-directory: frontend

      - name: Coverage gate
        run: npm run test:coverage
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
        working-directory: frontend

      - name: E2E
        run: npm run test:e2e
        working-directory: frontend
        env:
          CI: true

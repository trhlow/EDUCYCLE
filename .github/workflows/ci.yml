name: EduCycle CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  backend:
    name: Build Backend (Java 17)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build & verify
        run: mvn -f source/backend/educycle-java/pom.xml clean verify

  frontend:
    name: Build Frontend (Node 20)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: source/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: source/frontend

      - name: Test
        run: npm test
        working-directory: source/frontend

      - name: Build
        run: npm run build
        working-directory: source/frontend

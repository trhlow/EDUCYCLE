# EduCycle — optional pipeline: version bump on dev + Java build (backend module).
# Canonical CI: ci.yml

name: Continuous Dev Pipeline

on:
  push:
    branches:
      - dev
  workflow_dispatch:
    inputs:
      action:
        description: "Choose action"
        required: true
        default: "release"
        type: choice
        options:
          - release

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bump-version:
    name: Auto semantic version bump
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    permissions:
      contents: write

    steps:
      - name: Checkout repository (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run version bump script
        run: |
          chmod +x scripts/continuous-dev.sh
          bash scripts/continuous-dev.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Show current VERSION
        run: |
          echo "Version in this build: $(cat VERSION)"

  build-and-test:
    name: Build and test (Java)
    runs-on: ubuntu-latest
    needs: bump-version
    if: github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Build with Maven
        run: mvn -B -f backend/educycle-java/pom.xml clean package --no-transfer-progress

      - name: Run tests
        run: mvn -B -f backend/educycle-java/pom.xml test --no-transfer-progress

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ github.run_number }}
          path: backend/educycle-java/target/surefire-reports/

  release:
    name: Release — merge dev to main
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'release'

    permissions:
      contents: write

    steps:
      - name: Checkout repository (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name  "Release Bot"
          git config user.email "bot@educycle.dev"

      - name: Run release script
        run: |
          chmod +x scripts/release.sh
          bash scripts/release.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Print release summary
        run: |
          echo "### Release complete" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** $(cat VERSION)" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** main" >> $GITHUB_STEP_SUMMARY

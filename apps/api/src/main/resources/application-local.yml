# Profile "local": chạy máy dev với .env.local.
# Kích hoạt: mvn spring-boot:run "-Dspring-boot.run.profiles=local"
spring:
  config:
    import: optional:file:.env.local[.properties]
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/educycledb}
    username: ${SPRING_DATASOURCE_USERNAME:educycle}
    password: ${SPRING_DATASOURCE_PASSWORD:}

jwt:
  secret: ${JWT_SECRET:}

# Swagger/OpenAPI + cho phép truy cập không JWT (SecurityConfig khi educycle.security.swagger-ui-public=true).
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

educycle:
  security:
    swagger-ui-public: true

logging:
  level:
    com.educycle: DEBUG

# Profile "docker": Postgres qua Docker (5433). Port 8081 để tránh xung đột Apache/XAMPP thường chiếm 8080.
server:
  port: 8081

spring:
  config:
    import: optional:file:.env.local[.properties]
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/educycledb}
    username: ${SPRING_DATASOURCE_USERNAME:educycle}
    password: ${SPRING_DATASOURCE_PASSWORD:${POSTGRES_PASSWORD:}}

jwt:
  secret: ${JWT_SECRET:}

logging:
  level:
    com.educycle: DEBUG

# GitHub Actions / jar CI — Postgres service trên localhost:5432 (map cổng)
spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/educycledb}
    username: ${SPRING_DATASOURCE_USERNAME:educycle}
    password: ${SPRING_DATASOURCE_PASSWORD:}

jwt:
  secret: ${JWT_SECRET:}

# Bật springdoc để integration test xác nhận /v3/api-docs yêu cầu JWT khi swagger-ui-public=false (mặc định).
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

educycle:
  rate-limit:
    enabled: false
  transactions:
    expiry:
      enabled: false
  # Chỉ CI E2E API: OTP cố định thay vì đọc email (không bật ở production).
  e2e-fixed-otp: ${EDUCYCLE_E2E_FIXED_OTP:}

logging:
  level:
    root: WARN
    com.educycle: INFO

spring:
  application:
    name: educycle-api
  main:
    keep-alive: true
  threads:
    virtual:
      enabled: ${SPRING_THREADS_VIRTUAL_ENABLED:true}
  mvc:
    apiversion:
      use:
        header: ${API_VERSION_HEADER:X-API-Version}
      default: ${API_VERSION_DEFAULT:1.0}
  http:
    serviceclient:
      unsplash:
        base-url: ${UNSPLASH_API_BASE_URL:https://api.unsplash.com}
        connect-timeout: 10s
        read-timeout: 12s
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 6MB

  datasource:
    url: ${SPRING_DATASOURCE_URL:}
    username: ${SPRING_DATASOURCE_USERNAME:}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

# ── SMTP (tuỳ chọn) ─────────────────────────────────────────────────────────
# Thêm profile "smtp" + biến MAIL_* — xem application-smtp.yml và README (mục Email).
# Ví dụ local: mvn spring-boot:run "-Dspring-boot.run.profiles=docker,smtp"
# Docker: SPRING_PROFILES_ACTIVE=production,smtp trong .env (cùng MAIL_HOST, …).

server:
  forward-headers-strategy: framework

app:
  frontend-base-url: ${APP_FRONTEND_BASE_URL:http://localhost:5173}
  mail-from: ${APP_MAIL_FROM:EduCycle <noreply@educycle.local>}
  # Ảnh sản phẩm (local). Production: dùng object storage + URL công khai.
  upload-dir: ${APP_UPLOAD_DIR:./data/uploads}

# Danh sách origin cách nhau bởi dấu phẩy — production set CORS_ALLOWED_ORIGINS
cors:
  allowed-origins-csv: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:3000,http://localhost,http://127.0.0.1}

jwt:
  secret: ${JWT_SECRET:}
  issuer: ${JWT_ISSUER:EduCycle}
  audience: ${JWT_AUDIENCE:EduCycleUsers}
  expiration-hours: ${JWT_EXPIRATION_HOURS:2}

# ── Anthropic AI Chatbot ────────────────────────────────────────────────────
# Lấy API key tại: https://console.anthropic.com/
# Dùng biến môi trường ANTHROPIC_API_KEY để không commit key lên git
anthropic:
  api-key: ${ANTHROPIC_API_KEY:}
  model: claude-sonnet-4-20250514

# ── OpenAI (tuỳ chọn) — embeddings cho RAG chatbot; không dùng cho chat trực tiếp
openai:
  api-key: ${OPENAI_API_KEY:}
  embedding-model: text-embedding-3-small

# ── Unsplash (hero visuals via backend proxy; keep key server-side)
unsplash:
  access-key: ${UNSPLASH_ACCESS_KEY:}
  api-base-url: ${UNSPLASH_API_BASE_URL:https://api.unsplash.com}
  cache-ttl-seconds: ${UNSPLASH_CACHE_TTL_SECONDS:21600}

# ── EduCycle ── rate limit API (Bucket4j filter), Redis (AI rate limit đa instance)
educycle:
  # OTP giao dịch: HMAC-SHA256; để trống → dùng jwt.secret (dev). Production: EDUCYCLE_OTP_HMAC_SECRET riêng.
  otp:
    hmac-secret: ${EDUCYCLE_OTP_HMAC_SECRET:}
    registration:
      expire-minutes: 30
    transaction:
      max-failed-attempts: 5
      lock-minutes: 30
      expiry-minutes: 30
      http-verify-per-minute: 5
      http-generate-per-window: 3
      http-generate-window-minutes: 5
  rate-limit:
    enabled: true
    prefer-x-real-ip: false
  redis:
    enabled: ${EDUCYCLE_REDIS_ENABLED:false}
    host: ${EDUCYCLE_REDIS_HOST:localhost}
    port: ${EDUCYCLE_REDIS_PORT:6379}
  # RAG: truy xuất đoạn tri thức trước khi gọi Claude (cần OPENAI_API_KEY + chunk có embedding)
  rag:
    enabled: ${EDUCYCLE_RAG_ENABLED:true}
    top-k: ${EDUCYCLE_RAG_TOP_K:5}
    min-cosine-similarity: ${EDUCYCLE_RAG_MIN_COSINE:0.28}
    bootstrap-enabled: ${EDUCYCLE_RAG_BOOTSTRAP:true}
  # Hết hạn giao dịch tự động (job định kỳ) — Sprint B
  transactions:
    expiry:
      enabled: ${EDUCYCLE_TRANSACTIONS_EXPIRY_ENABLED:true}
      pending-stale-hours: 48
      accepted-stale-hours: 168
      check-interval-ms: 3600000
  # Actuator / Prometheus — Sprint C (chỉ bật public khi đặt true + bảo vệ bằng network / reverse proxy)
  security:
    prometheus-endpoint-public: ${EDUCYCLE_PROMETHEUS_PUBLIC:false}

# ── Sentry (tuỳ chọn) — chỉ gửi khi SENTRY_DSN có giá trị ──
sentry:
  dsn: ${SENTRY_DSN:}
  environment: ${SENTRY_ENVIRONMENT:development}
  traces-sample-rate: ${SENTRY_TRACES_SAMPLE_RATE:0.0}

otel:
  sdk:
    disabled: ${OTEL_SDK_DISABLED:true}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
    info:
      enabled: true
  info:
    defaults:
      enabled: true
    build:
      enabled: true

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %clr(%5p){faint} [%X{requestId:-}] %clr(%-40.40logger{39}){cyan} : %m%n%wEx"
  level:
    root: INFO
    # Dev profiles `local` / `docker` override to DEBUG — avoid verbose logs by default (staging/prod-safe).
    com.educycle: INFO
    org.springframework.security: WARN
